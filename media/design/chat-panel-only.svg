<svg xmlns="http://www.w3.org/2000/svg" width="460" height="820" viewBox="0 0 460 820" font-family="-apple-system, 'PingFang SC', 'Segoe UI', sans-serif">
  <rect width="460" height="820" fill="#e7e9e4"/>
  <!-- 面板本体 -->
  <rect x="20" y="20" width="420" height="780" rx="12" fill="#fbfbfa" stroke="#d6d9d2"/>

  <!-- ① 顶栏 -->
  <path d="M20 32 a12 12 0 0 1 12 -12 h396 a12 12 0 0 1 12 12 v36 h-420 z" fill="#f3f4f1"/>
  <line x1="20" y1="68" x2="440" y2="68" stroke="#dfe2dd"/>
  <text x="40" y="49" font-size="14" font-weight="600" fill="#202421">命令注册表 mini clone</text>
  <path d="M250 42 l5 5 l5 -5" fill="none" stroke="#8a9086" stroke-width="1.5"/>
  <!-- 新对话 + -->
  <rect x="372" y="31" width="28" height="28" rx="7" fill="none" stroke="#cfd3cc"/>
  <line x1="386" y1="38" x2="386" y2="52" stroke="#5a6157" stroke-width="1.5"/>
  <line x1="379" y1="45" x2="393" y2="45" stroke="#5a6157" stroke-width="1.5"/>
  <!-- 收起 -->
  <rect x="406" y="31" width="28" height="28" rx="7" fill="none" stroke="#cfd3cc"/>
  <path d="M414 39 l12 12 M426 39 l-12 12" stroke="#5a6157" stroke-width="1.5"/>

  <!-- ② 消息流 -->
  <!-- 用户 -->
  <rect x="150" y="92" width="270" height="40" rx="13" fill="#2e5638"/>
  <text x="168" y="117" font-size="13.5" fill="#fff">help 和 login 有什么区别？</text>

  <!-- 助手: 思考折叠 -->
  <rect x="40" y="150" width="300" height="28" rx="8" fill="#f7f6f3" stroke="#e4e2dd"/>
  <text x="54" y="168" font-size="11.5" fill="#8a9086">▸ 思考过程</text>
  <!-- 工具行 -->
  <rect x="40" y="186" width="200" height="28" rx="8" fill="#eef0ec"/>
  <text x="54" y="204" font-size="12" fill="#2e5638" font-family="ui-monospace,Menlo,monospace">Grep</text>
  <text x="104" y="204" font-size="11.5" fill="#8a9086">commands.ts</text>
  <text x="222" y="204" font-size="12" fill="#2e5638">✓</text>
  <!-- 正文 -->
  <rect x="40" y="222" width="380" height="150" rx="13" fill="#fff" stroke="#dfe2dd"/>
  <text x="58" y="248" font-size="13.5" fill="#202421">两题都是命令对象，区别在 action：</text>
  <text x="58" y="274" font-size="13.5" fill="#3a3f39">· help 的 action 打印帮助文本</text>
  <text x="58" y="300" font-size="13.5" fill="#3a3f39">· login 的 action 触发登录流程</text>
  <text x="58" y="326" font-size="13.5" fill="#3a3f39">你练的 014 是按 enabled 过滤出</text>
  <text x="58" y="352" font-size="13.5" fill="#3a3f39">启用的那批，再取它们的 name。</text>

  <!-- 第二轮用户 -->
  <rect x="200" y="394" width="220" height="40" rx="13" fill="#2e5638"/>
  <text x="218" y="419" font-size="13.5" fill="#fff">那能给我出一道变体题吗</text>
  <!-- 助手流式中（打字光标） -->
  <rect x="40" y="452" width="380" height="78" rx="13" fill="#fff" stroke="#dfe2dd"/>
  <text x="58" y="478" font-size="13.5" fill="#3a3f39">好，015 我先写示范，你照着誊</text>
  <text x="58" y="504" font-size="13.5" fill="#3a3f39">抄：把过滤条件换成<tspan font-family="ui-monospace,Menlo,monospace" fill="#202421"> hidden</tspan></text>
  <rect x="232" y="494" width="7" height="15" fill="#b9c1b4"/>

  <!-- ③ 输入区 -->
  <rect x="36" y="700" width="388" height="66" rx="13" fill="#fff" stroke="#cfd3cc"/>
  <text x="54" y="728" font-size="13" fill="#a8aea4">问点什么，Enter 发送</text>
  <circle cx="396" cy="746" r="16" fill="#2e5638"/>
  <path d="M396 739 l0 13 M390 745 l6 -6 l6 6" stroke="#fff" stroke-width="1.6" fill="none"/>

  <!-- ④ 状态条 -->
  <text x="40" y="788" font-size="11" fill="#8a9086">Claude Code 2.1 · 代理 7890 · 多轮已接续</text>

  <!-- 标注 -->
  <g font-size="11" fill="#2e5638" font-weight="700">
    <text x="40" y="84">① 顶栏</text>
    <text x="40" y="146">② 消息流</text>
    <text x="40" y="694">③ 输入</text>
  </g>
</svg>
