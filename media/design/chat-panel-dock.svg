<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" font-family="-apple-system, 'PingFang SC', 'Segoe UI', sans-serif">
  <!-- 画布底 -->
  <rect width="1280" height="840" fill="#e7e9e4"/>

  <!-- ============ 应用窗口 ============ -->
  <g>
    <rect x="20" y="20" width="1240" height="800" rx="12" fill="#f5f6f4" stroke="#d6d9d2"/>

    <!-- 标题栏交通灯 -->
    <circle cx="44" cy="44" r="6" fill="#e0e2dc"/>
    <circle cx="64" cy="44" r="6" fill="#e0e2dc"/>
    <circle cx="84" cy="44" r="6" fill="#e0e2dc"/>
    <text x="120" y="48" font-size="12" fill="#8a9086">练习工作台</text>

    <!-- 顶栏分隔 -->
    <line x1="20" y1="68" x2="1260" y2="68" stroke="#dfe2dd"/>

    <!-- ===== 左侧栏 (230) ===== -->
    <rect x="20" y="68" width="230" height="752" fill="#eef0ec"/>
    <line x1="250" y1="68" x2="250" y2="820" stroke="#dfe2dd"/>
    <!-- 收起图标 -->
    <rect x="38" y="84" width="20" height="16" rx="3" fill="none" stroke="#8a9086"/>
    <line x1="48" y1="84" x2="48" y2="100" stroke="#8a9086"/>
    <!-- nav -->
    <text x="44" y="130" font-size="13" fill="#3a3f39">✎  锚点记录</text>
    <text x="44" y="158" font-size="13" fill="#3a3f39">✦  AI 能做什么</text>
    <!-- AI 对话 选中态（高亮，说明面板已打开） -->
    <rect x="32" y="170" width="206" height="30" rx="8" fill="#d8ded5"/>
    <text x="44" y="190" font-size="13" font-weight="600" fill="#202421">💬  AI 对话</text>
    <!-- 项目 -->
    <text x="44" y="232" font-size="11" font-weight="600" fill="#8a9086">项目</text>
    <text x="44" y="258" font-size="13" fill="#3a3f39">📁  typescript-practice</text>
    <rect x="32" y="270" width="206" height="28" rx="8" fill="#d8ded5"/>
    <text x="56" y="288" font-size="13" font-weight="600" fill="#202421">命令注册表渐进式轨道</text>
    <text x="218" y="288" font-size="11" fill="#8a9086">14</text>
    <!-- 底部 vscode -->
    <line x1="32" y1="780" x2="238" y2="780" stroke="#dfe2dd"/>
    <text x="44" y="802" font-size="13" fill="#3a3f39">‹›  在 VSCode 中打开</text>

    <!-- ===== 练习列 (180) ===== -->
    <rect x="250" y="68" width="180" height="752" fill="#f3f4f1"/>
    <line x1="430" y1="68" x2="430" y2="820" stroke="#dfe2dd"/>
    <text x="266" y="100" font-size="11" font-weight="600" fill="#8a9086">命令注册表渐进式轨道</text>
    <g font-size="12.5" fill="#5a6157">
      <text x="266" y="130">011  拆分命令文件</text>
      <text x="266" y="158">012  封装执行函数</text>
      <text x="266" y="186">013  三文件命令结构</text>
    </g>
    <rect x="258" y="198" width="164" height="28" rx="8" fill="#d8ded5"/>
    <text x="266" y="216" font-size="12.5" font-weight="600" fill="#202421">014  提取启用命令</text>
    <circle cx="412" cy="212" r="3" fill="#4a7c52"/>

    <!-- ===== 详情区 (主区, 收窄给右栏让位) ===== -->
    <rect x="430" y="68" width="420" height="752" fill="#f5f6f4"/>
    <line x1="850" y1="68" x2="850" y2="820" stroke="#dfe2dd"/>
    <text x="456" y="112" font-size="18" font-weight="700" fill="#202421">014 提取启用命令</text>
    <text x="456" y="138" font-size="12.5" fill="#5a6157">这次使用 5 个版本前的 009 作为基底。</text>
    <text x="456" y="178" font-size="11" font-weight="600" fill="#5a6157">手敲文件</text>
    <rect x="456" y="190" width="86" height="30" rx="8" fill="#fff" stroke="#dfe2dd"/>
    <text x="468" y="209" font-size="11" fill="#3a3f39">014.js</text>
    <rect x="552" y="190" width="96" height="30" rx="8" fill="#fff" stroke="#dfe2dd"/>
    <text x="564" y="209" font-size="11" fill="#3a3f39">014-1.js</text>
    <!-- 主操作 -->
    <rect x="456" y="246" width="120" height="40" rx="10" fill="#2e5638"/>
    <text x="476" y="271" font-size="14" fill="#fff">打开练习现场</text>
    <rect x="586" y="246" width="96" height="40" rx="10" fill="#fff" stroke="#cfd3cc"/>
    <text x="606" y="271" font-size="14" fill="#202421">运行练习</text>
    <!-- 运行结果 -->
    <rect x="456" y="312" width="368" height="120" rx="10" fill="#fff" stroke="#dfe2dd"/>
    <text x="470" y="336" font-size="12" fill="#5a6157" font-family="ui-monospace,Menlo,monospace">&gt; node 014.js</text>
    <text x="470" y="360" font-size="12" fill="#8a9086">点「运行练习」，结果显示在这里。</text>

    <!-- ============================================= -->
    <!-- ===== ★ AI 对话面板 (右侧常驻, 410宽) ★ ===== -->
    <!-- ============================================= -->
    <rect x="850" y="68" width="410" height="752" fill="#fbfbfa"/>

    <!-- ① 顶栏: 会话切换 + 新对话 + 收起 -->
    <rect x="850" y="68" width="410" height="48" fill="#f3f4f1"/>
    <line x1="850" y1="116" x2="1260" y2="116" stroke="#dfe2dd"/>
    <!-- 会话标题下拉 -->
    <text x="872" y="97" font-size="13" font-weight="600" fill="#202421">命令注册表 mini clone</text>
    <path d="M1066 89 l5 5 l5 -5" fill="none" stroke="#8a9086" stroke-width="1.4"/>
    <!-- 新对话 + -->
    <rect x="1188" y="80" width="26" height="26" rx="7" fill="none" stroke="#cfd3cc"/>
    <line x1="1201" y1="86" x2="1201" y2="100" stroke="#5a6157" stroke-width="1.4"/>
    <line x1="1194" y1="93" x2="1208" y2="93" stroke="#5a6157" stroke-width="1.4"/>
    <!-- 收起 ✕ -->
    <rect x="1220" y="80" width="26" height="26" rx="7" fill="none" stroke="#cfd3cc"/>
    <path d="M1227 87 l12 12 M1239 87 l-12 12" stroke="#5a6157" stroke-width="1.4"/>

    <!-- ② 消息流 -->
    <!-- 用户消息 (右, 绿) -->
    <rect x="966" y="140" width="272" height="38" rx="12" fill="#2e5638"/>
    <text x="984" y="164" font-size="13" fill="#fff">help 和 login 这两题有什么区别？</text>

    <!-- 助手消息 (左) -->
    <!-- 思考折叠条 -->
    <rect x="872" y="194" width="300" height="26" rx="8" fill="#f7f6f3" stroke="#e4e2dd"/>
    <text x="884" y="211" font-size="11" fill="#8a9086">▸ 思考过程</text>
    <!-- 工具调用行 -->
    <rect x="872" y="228" width="180" height="26" rx="8" fill="#eef0ec"/>
    <text x="884" y="245" font-size="11.5" fill="#2e5638" font-family="ui-monospace,Menlo,monospace">Grep</text>
    <text x="930" y="245" font-size="11" fill="#8a9086">commands.ts</text>
    <text x="1036" y="245" font-size="11" fill="#2e5638">✓</text>
    <!-- 正文卡片 -->
    <rect x="872" y="262" width="366" height="118" rx="12" fill="#fff" stroke="#dfe2dd"/>
    <text x="888" y="286" font-size="13" fill="#202421">两题都是命令对象，区别在 action：</text>
    <text x="888" y="308" font-size="13" fill="#3a3f39">help 的 action 打印帮助文本，</text>
    <text x="888" y="330" font-size="13" fill="#3a3f39">login 的 action 触发登录流程。</text>
    <text x="888" y="352" font-size="13" fill="#3a3f39">你练到的 014 是把它们按 enabled</text>
    <text x="888" y="374" font-size="13" fill="#3a3f39">过滤……</text>

    <!-- ③ 输入区 -->
    <rect x="866" y="704" width="378" height="64" rx="12" fill="#fff" stroke="#cfd3cc"/>
    <text x="884" y="730" font-size="13" fill="#a8aea4">问点什么，Enter 发送，Shift+Enter 换行</text>
    <!-- 发送按钮 -->
    <circle cx="1216" cy="748" r="15" fill="#2e5638"/>
    <path d="M1216 742 l0 12 M1211 747 l5 -5 l5 5" stroke="#fff" stroke-width="1.5" fill="none"/>

    <!-- ④ 底部状态条 -->
    <text x="872" y="792" font-size="11" fill="#8a9086">Claude Code 2.1 · 代理 7890 · 多轮已接续</text>
  </g>

  <!-- ============ 标注 ============ -->
  <g font-size="12" fill="#7a8f7e">
    <text x="884" y="60" font-weight="700" fill="#2e5638">① 顶栏</text>
    <text x="970" y="60" fill="#9aa">会话下拉切换 · ＋新对话 · ✕收起</text>
    <text x="884" y="132" font-weight="700" fill="#2e5638">② 消息流</text>
    <text x="966" y="132" fill="#9aa">用户/助手 · 思考折叠 · 工具行 · 流式</text>
    <text x="872" y="696" font-weight="700" fill="#2e5638">③ 输入区</text>
    <text x="872" y="812" font-weight="700" fill="#2e5638">④ 状态条</text>
  </g>
</svg>
